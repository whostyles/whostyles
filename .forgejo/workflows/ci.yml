name: Testes Automatizados

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-js:
    name: Testes JavaScript
    runs-on: codeberg-tiny
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Executar Testes JS
        run: node tests/verify_engine.js

  test-php:
    name: Testes PHP
    runs-on: codeberg-tiny
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar PHP
        uses: github.com/shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Executar Testes PHP
        run: php tests/verify_processor.php
